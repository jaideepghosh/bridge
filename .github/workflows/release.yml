name: Release Desktop App

on:
  release:
    types: [published]

jobs:
  build-tauri:
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            artifact-pattern: '*.dmg'
            artifact-name: dmg

          - platform: windows-latest
            artifact-pattern: '*.msi'
            artifact-name: msi

          - platform: ubuntu-22.04
            artifact-pattern: '*.deb'
            artifact-name: deb

    runs-on: ${{ matrix.platform }}

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Rust toolchain ──────────────────────────────────────────────────
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      # ── 3. Rust build cache ────────────────────────────────────────────────
      # save-if: false means we READ the cache (for dependencies) but never
      # write it back — so the app binary is always compiled fresh from source,
      # picking up the correct version from tauri.conf.json every time.
      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri
          save-if: "false"

      # ── 4. Linux system dependencies ───────────────────────────────────────
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev

      # ── 5. Node.js ─────────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # ── 6. Install all workspace dependencies ──────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── 7. Extract version from tag (e.g. v1.2.3 → 1.2.3) ─────────────────
      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      # ── 8. Stamp version into root package.json ────────────────────────────
      # sync-version.js reads from root package.json and propagates to
      # tauri.conf.json and all workspace packages. We update it here so
      # the correct version flows through the whole build.
      - name: Update root package.json version from release tag
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          npm version "$VERSION" --no-git-tag-version --workspaces=false
          echo "Stamped root package.json with version $VERSION"

      # ── 9. Build the Tauri app ─────────────────────────────────────────────
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0.5.20
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

          # ── macOS code signing (uncomment when ready) ──────────────────────
          # APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          # APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

        with:
          projectPath: apps/desktop
          tagName: ${{ steps.version.outputs.tag }}
          releaseName: ${{ github.event.release.name }}
          releaseBody: ${{ github.event.release.body }}
          releaseDraft: false
          prerelease: ${{ github.event.release.prerelease }}
          includeUpdaterJson: true
          args: ${{ matrix.platform == 'macos-latest' && '--target universal-apple-darwin' || '' }}

      # ── 10. Upload versioned artifact to release ───────────────────────────
      - name: Upload versioned artifact to release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="${{ steps.version.outputs.tag }}"

          ARTIFACT=$(find apps/desktop/src-tauri/target -name "${{ matrix.artifact-pattern }}" \
            ! -path "*/deps/*" ! -name "*.d" | head -n 1)

          if [ -z "$ARTIFACT" ]; then
            echo "No artifact matching ${{ matrix.artifact-pattern }} found — skipping upload"
            exit 0
          fi

          EXT="${ARTIFACT##*.}"
          BASENAME=$(basename "$ARTIFACT" ".$EXT")
          VERSIONED_NAME="${BASENAME}_${VERSION}.${EXT}"

          echo "Uploading $ARTIFACT as $VERSIONED_NAME to release $TAG"
          gh release upload "$TAG" "$ARTIFACT#$VERSIONED_NAME" --clobber
