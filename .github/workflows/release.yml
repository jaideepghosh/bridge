name: Release Desktop App

# Triggered when a GitHub Release is published (e.g. tag v1.2.3)
on:
  release:
    types: [published]

jobs:
  build-tauri:
    permissions:
      contents: write # Needed to upload assets to the GitHub Release

    strategy:
      fail-fast: false # Let all platforms finish even if one fails
      matrix:
        include:
          - platform: macos-latest   # Apple Silicon + Intel via universal build
            artifact-pattern: '*.dmg'
            artifact-name: dmg

          - platform: windows-latest
            artifact-pattern: '*.msi'
            artifact-name: msi

          - platform: ubuntu-22.04
            artifact-pattern: '*.deb'
            artifact-name: deb

    runs-on: ${{ matrix.platform }}

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Rust toolchain ──────────────────────────────────────────────────
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          # Universal macOS binary targets (Intel + Apple Silicon)
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      # ── 3. Rust build cache ────────────────────────────────────────────────
      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      # ── 4. Linux system dependencies ───────────────────────────────────────
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev

      # ── 5. Node.js ─────────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # ── 6. Install all workspace dependencies ──────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── 7. Extract version from the release tag (e.g. v1.2.3 → 1.2.3) ─────
      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"          # strip leading 'v' if present
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      # ── 8. Sync version into tauri.conf.json ───────────────────────────────
      # This ensures the built artifact filename matches the release tag.
      - name: Set app version from release tag
        shell: bash
        working-directory: apps/desktop/src-tauri
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # Works on both macOS (BSD sed) and Linux/Windows-bash (GNU sed)
          if [[ "$RUNNER_OS" == "macOS" ]]; then
            sed -i '' "s/\"version\": \".*\"/\"version\": \"$VERSION\"/" tauri.conf.json
          else
            sed -i "s/\"version\": \".*\"/\"version\": \"$VERSION\"/" tauri.conf.json
          fi
          echo "Set version to $VERSION"

      # ── 9. Build the Tauri app ─────────────────────────────────────────────
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

          # ── macOS code signing (uncomment when ready) ──────────────────────
          # APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}           # base64-encoded .p12
          # APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }} # e.g. "Developer ID Application: Your Name (TEAMID)"
          # APPLE_ID: ${{ secrets.APPLE_ID }}                             # your Apple ID email
          # APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}                 # app-specific password
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

          # ── Windows code signing (uncomment when ready) ────────────────────
          # TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          # TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

        with:
          projectPath: apps/desktop
          tagName: ${{ steps.version.outputs.tag }}
          releaseName: ${{ github.event.release.name }}
          releaseBody: ${{ github.event.release.body }}
          releaseDraft: false
          prerelease: ${{ github.event.release.prerelease }}
          # Universal macOS binary: builds for both Intel and Apple Silicon
          args: ${{ matrix.platform == 'macos-latest' && '--target universal-apple-darwin' || '' }}

      # ── 10. Upload platform artifact to the release ────────────────────────
      # tauri-action already uploads artifacts, but this step ensures the file
      # is also attached with a predictable versioned name.
      - name: Upload versioned artifact to release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="${{ steps.version.outputs.tag }}"

          # Find the built artifact (search inside the Tauri bundle output dir)
          ARTIFACT=$(find apps/desktop/src-tauri/target -name "${{ matrix.artifact-pattern }}" \
            ! -path "*/deps/*" ! -name "*.d" | head -n 1)

          if [ -z "$ARTIFACT" ]; then
            echo "No artifact matching ${{ matrix.artifact-pattern }} found — skipping upload"
            exit 0
          fi

          # Build a versioned filename: MyApp_1.2.3.dmg / MyApp_1.2.3.msi / MyApp_1.2.3.deb
          EXT="${ARTIFACT##*.}"
          BASENAME=$(basename "$ARTIFACT" ".$EXT")
          VERSIONED_NAME="${BASENAME}_${VERSION}.${EXT}"

          echo "Uploading $ARTIFACT as $VERSIONED_NAME to release $TAG"
          gh release upload "$TAG" "$ARTIFACT#$VERSIONED_NAME" --clobber