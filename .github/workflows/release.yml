name: Release Desktop App

on:
  release:
    types: [published]

jobs:
  build-tauri:
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            artifact-pattern: '*.dmg'
            artifact-name: dmg

          - platform: windows-latest
            artifact-pattern: '*.msi'
            artifact-name: msi

          - platform: ubuntu-22.04
            artifact-pattern: '*.deb'
            artifact-name: deb

    runs-on: ${{ matrix.platform }}

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Rust toolchain ──────────────────────────────────────────────────
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      # ── 3. Rust build cache ────────────────────────────────────────────────
      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri
          save-if: "false"

      # ── 4. Linux system dependencies ───────────────────────────────────────
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev

      # ── 5. Node.js ─────────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # ── 6. Install all workspace dependencies ──────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── 7. Extract version from tag (e.g. v1.2.3 → 1.2.3) ─────────────────
      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      # ── 8. Stamp version into ALL version files ────────────────────────────
      # All three files must agree BEFORE tauri-action starts. tauri-action
      # reads tauri.conf.json first to know the expected artifact filename,
      # then runs prebuild (sync-version.js) — but by then it's too late.
      #   • root package.json  → source of truth for sync-version.js
      #   • tauri.conf.json    → read by tauri-action BEFORE prebuild runs
      #   • Cargo.toml         → read by cargo for the binary version
      - name: Stamp version into package.json, tauri.conf.json and Cargo.toml
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          CARGO_TOML="apps/desktop/src-tauri/Cargo.toml"
          TAURI_CONF="apps/desktop/src-tauri/tauri.conf.json"

          # 1. Root package.json
          npm version "$VERSION" --no-git-tag-version --workspaces=false
          echo "✓ root package.json → $VERSION"

          # 2. tauri.conf.json — tauri-action reads this BEFORE running prebuild
          #    to determine the expected artifact filename. If this says 0.1.2
          #    but the tag is 0.1.6, tauri-action looks for Bridge_0.1.6_*.dmg,
          #    finds Bridge_0.1.2_*.dmg instead, and skips latest.json entirely.
          node -e "
            const fs = require('fs');
            const conf = JSON.parse(fs.readFileSync('$TAURI_CONF', 'utf8'));
            conf.version = '$VERSION';
            fs.writeFileSync('$TAURI_CONF', JSON.stringify(conf, null, 2) + '\n');
          "
          echo "✓ tauri.conf.json → $VERSION"

          # 3. Cargo.toml — cargo reads this for the binary version
          if [[ "$RUNNER_OS" == "macOS" ]]; then
            sed -i '' "s/^version = \".*\"/version = \"$VERSION\"/" "$CARGO_TOML"
          else
            sed -i "s/^version = \".*\"/version = \"$VERSION\"/" "$CARGO_TOML"
          fi
          echo "✓ Cargo.toml → $VERSION"

          # Verify all three before the build starts
          echo "--- Verification ---"
          node -e "const p=JSON.parse(require('fs').readFileSync('package.json','utf8')); console.log('package.json:', p.version)"
          node -e "const p=JSON.parse(require('fs').readFileSync('$TAURI_CONF','utf8')); console.log('tauri.conf.json:', p.version)"
          grep '^version' "$CARGO_TOML"

      # ── 9. Build the Tauri app ─────────────────────────────────────────────
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0.5.20
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

          # ── macOS code signing (uncomment when ready) ──────────────────────
          # APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          # APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

        with:
          projectPath: apps/desktop
          tagName: ${{ steps.version.outputs.tag }}
          releaseName: ${{ github.event.release.name }}
          releaseBody: ${{ github.event.release.body }}
          releaseDraft: false
          prerelease: ${{ github.event.release.prerelease }}
          includeUpdaterJson: true
          args: ${{ matrix.platform == 'macos-latest' && '--target universal-apple-darwin' || '' }}

      # ── 10. Upload versioned artifact to release ───────────────────────────
      - name: Upload versioned artifact to release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="${{ steps.version.outputs.tag }}"

          ARTIFACT=$(find apps/desktop/src-tauri/target -name "${{ matrix.artifact-pattern }}" \
            ! -path "*/deps/*" ! -name "*.d" | head -n 1)

          if [ -z "$ARTIFACT" ]; then
            echo "No artifact matching ${{ matrix.artifact-pattern }} found — skipping upload"
            exit 0
          fi

          EXT="${ARTIFACT##*.}"
          BASENAME=$(basename "$ARTIFACT" ".$EXT")
          VERSIONED_NAME="${BASENAME}_${VERSION}.${EXT}"

          echo "Uploading $ARTIFACT as $VERSIONED_NAME to release $TAG"
          gh release upload "$TAG" "$ARTIFACT#$VERSIONED_NAME" --clobber
