name: Release Desktop App

on:
  release:
    types: [published]

jobs:
  build-tauri:
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target universal-apple-darwin
            # grep pattern to find the right .sig among all .sig files
            sig-grep: 'bundle/macos/.*\.app\.tar\.gz\.sig$'
            sig-name: updater-darwin.sig
            installer-glob: bundle/dmg
            installer-ext: dmg

          - platform: windows-latest
            args: ''
            sig-grep: 'bundle/msi/.*\.msi\.zip\.sig$'
            sig-name: updater-windows.sig
            installer-glob: bundle/msi
            installer-ext: msi

          - platform: ubuntu-22.04
            args: ''
            sig-grep: 'bundle/appimage/.*\.AppImage\.tar\.gz\.sig$'
            sig-name: updater-linux.sig
            installer-glob: bundle/deb
            installer-ext: deb

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri
          save-if: "false"

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev \
            patchelf libssl-dev libgtk-3-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Stamp version into package.json, tauri.conf.json and Cargo.toml
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          CARGO_TOML="apps/desktop/src-tauri/Cargo.toml"
          TAURI_CONF="apps/desktop/src-tauri/tauri.conf.json"

          npm version "$VERSION" --no-git-tag-version --workspaces=false
          node -e "
            const fs = require('fs');
            const c = JSON.parse(fs.readFileSync('$TAURI_CONF','utf8'));
            c.version = '$VERSION';
            fs.writeFileSync('$TAURI_CONF', JSON.stringify(c,null,2)+'\n');
          "
          if [[ "$RUNNER_OS" == "macOS" ]]; then
            sed -i '' "s/^version = \".*\"/version = \"$VERSION\"/" "$CARGO_TOML"
          else
            sed -i "s/^version = \".*\"/version = \"$VERSION\"/" "$CARGO_TOML"
          fi

          echo "--- Verification ---"
          node -e "const p=JSON.parse(require('fs').readFileSync('package.json','utf8')); console.log('package.json:', p.version)"
          node -e "const p=JSON.parse(require('fs').readFileSync('$TAURI_CONF','utf8')); console.log('tauri.conf.json:', p.version)"
          grep '^version' "$CARGO_TOML"

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0.5.20
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # ── macOS code signing (uncomment when ready) ──────────────────────
          # APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          # APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: apps/desktop
          tagName: ${{ steps.version.outputs.tag }}
          releaseName: ${{ github.event.release.name }}
          releaseBody: ${{ github.event.release.body }}
          releaseDraft: false
          prerelease: ${{ github.event.release.prerelease }}
          args: ${{ matrix.args }}

      - name: Upload installer and sig to release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          VERSION="${{ steps.version.outputs.version }}"

          echo "=== All .sig files found in target ==="
          find apps/desktop/src-tauri/target -name "*.sig" \
            ! -path "*/deps/*" ! -path "*/incremental/*" 2>/dev/null
          echo "======================================"

          # ── Upload installer ──
          INSTALLER=$(find apps/desktop/src-tauri/target \
            -path "*/${{ matrix.installer-glob }}/*.${{ matrix.installer-ext }}" \
            ! -path "*/deps/*" ! -path "*/incremental/*" \
            2>/dev/null | head -1)
          if [ -n "$INSTALLER" ]; then
            EXT="${INSTALLER##*.}"
            BASENAME=$(basename "$INSTALLER" ".$EXT")
            gh release upload "$TAG" "$INSTALLER#${BASENAME}_${VERSION}.${EXT}" --clobber || true
            echo "Uploaded installer: ${BASENAME}_${VERSION}.${EXT}"
          else
            echo "WARNING: No installer found for ${{ matrix.installer-ext }}"
          fi

          # ── Find .sig using grep on the full path ──
          # find + grep avoids shell glob issues across platforms
          SIG=$(find apps/desktop/src-tauri/target -name "*.sig" \
            ! -path "*/deps/*" ! -path "*/incremental/*" \
            2>/dev/null | grep -E '${{ matrix.sig-grep }}' | head -1)

          if [ -z "$SIG" ]; then
            echo "ERROR: No .sig file found matching pattern: ${{ matrix.sig-grep }}"
            echo "All .sig files available:"
            find apps/desktop/src-tauri/target -name "*.sig" \
              ! -path "*/deps/*" ! -path "*/incremental/*" 2>/dev/null
            exit 1
          fi

          echo "Found sig: $SIG"

          # Upload sig with predictable name so publish-updater-json can find it
          gh release upload "$TAG" "$SIG#${{ matrix.sig-name }}" --clobber
          echo "Uploaded sig as: ${{ matrix.sig-name }}"

          # Upload the updater payload (.tar.gz or .zip the sig covers)
          PAYLOAD="${SIG%.sig}"
          if [ -f "$PAYLOAD" ]; then
            gh release upload "$TAG" "$PAYLOAD#$(basename $PAYLOAD)" --clobber || true
            echo "Uploaded payload: $(basename $PAYLOAD)"
          fi

  # ── Assemble latest.json after all 3 platforms finish ──────────────────────
  publish-updater-json:
    needs: build-tauri
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Download sig files
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p /tmp/sigs
          gh release download "${{ steps.version.outputs.tag }}" \
            --repo jaideepghosh/bridge \
            --pattern "updater-*.sig" \
            --dir /tmp/sigs
          echo "Downloaded:"
          ls -la /tmp/sigs/

      - name: Build and upload latest.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_NOTES: ${{ github.event.release.body }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="${{ steps.version.outputs.tag }}"
          REPO="jaideepghosh/bridge"
          BASE_URL="https://github.com/${REPO}/releases/download/${TAG}"
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          MAC_SIG=$(cat /tmp/sigs/updater-darwin.sig 2>/dev/null || echo "")
          WIN_SIG=$(cat /tmp/sigs/updater-windows.sig 2>/dev/null || echo "")
          LINUX_SIG=$(cat /tmp/sigs/updater-linux.sig 2>/dev/null || echo "")

          echo "Mac sig:     $([ -n "$MAC_SIG" ]   && echo YES || echo MISSING)"
          echo "Windows sig: $([ -n "$WIN_SIG" ]   && echo YES || echo MISSING)"
          echo "Linux sig:   $([ -n "$LINUX_SIG" ] && echo YES || echo MISSING)"

          node << EOF
          const fs = require('fs');
          const v = '$VERSION';
          const base = '$BASE_URL';
          const mac   = \`$MAC_SIG\`.trim();
          const win   = \`$WIN_SIG\`.trim();
          const linux = \`$LINUX_SIG\`.trim();
          const platforms = {};

          if (mac) {
            platforms['darwin-aarch64'] = { signature: mac, url: base + '/Bridge.app.tar.gz' };
            platforms['darwin-x86_64']  = { signature: mac, url: base + '/Bridge.app.tar.gz' };
          }
          if (win) {
            platforms['windows-x86_64'] = {
              signature: win,
              url: base + '/Bridge_' + v + '_x64_en-US.msi.zip'
            };
          }
          if (linux) {
            platforms['linux-x86_64'] = {
              signature: linux,
              url: base + '/Bridge_' + v + '_amd64.AppImage.tar.gz'
            };
          }

          if (Object.keys(platforms).length === 0) {
            console.error('ERROR: No signatures found — cannot build latest.json');
            process.exit(1);
          }

          const json = {
            version: v,
            notes: process.env.RELEASE_NOTES || '',
            pub_date: '$PUB_DATE',
            platforms
          };

          fs.writeFileSync('latest.json', JSON.stringify(json, null, 2));
          console.log(JSON.stringify(json, null, 2));
          EOF

          gh release upload "$TAG" latest.json \
            --repo "$REPO" \
            --clobber

          echo "✅ latest.json uploaded to release $TAG"
