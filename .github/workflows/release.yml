name: Release Desktop App

on:
  release:
    types: [published]

jobs:
  publish-tauri:
    permissions:
      contents: write

    strategy:
      fail-fast: false

      matrix:
        include:
          # macOS Apple Silicon
          - platform: macos-latest
            args: --target aarch64-apple-darwin

          # macOS Intel
          - platform: macos-latest
            args: --target x86_64-apple-darwin

          # Linux x64
          - platform: ubuntu-22.04
            args: ""

          # Windows x64
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev

      - name: Install dependencies
        run: npm ci

      - name: Extract version from release tag
        id: version
        shell: bash
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Sync application versions
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          PACKAGE_JSON="package.json"
          CARGO_TOML="apps/desktop/src-tauri/Cargo.toml"
          TAURI_CONF="apps/desktop/src-tauri/tauri.conf.json"

          # Update package.json
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('$PACKAGE_JSON', 'utf8'));
            pkg.version = '$VERSION';
            fs.writeFileSync('$PACKAGE_JSON', JSON.stringify(pkg, null, 2) + '\n');
          "

          # Update tauri.conf.json
          node -e "
            const fs = require('fs');
            const config = JSON.parse(fs.readFileSync('$TAURI_CONF', 'utf8'));
            config.version = '$VERSION';
            fs.writeFileSync('$TAURI_CONF', JSON.stringify(config, null, 2) + '\n');
          "

          # Update Cargo.toml
          if [[ "$RUNNER_OS" == "macOS" ]]; then
            sed -i '' "s/^version = \".*\"/version = \"$VERSION\"/" "$CARGO_TOML"
          else
            sed -i "s/^version = \".*\"/version = \"$VERSION\"/" "$CARGO_TOML"
          fi

          echo "Updated all app versions to $VERSION"

      - name: Build and publish app
        uses: tauri-apps/tauri-action@v0.5.24
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

          # Required for updater signing
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

        with:
          projectPath: apps/desktop

          tagName: ${{ steps.version.outputs.tag }}

          releaseName: ${{ github.event.release.name }}

          releaseBody: ${{ github.event.release.body }}

          releaseDraft: false

          prerelease: ${{ github.event.release.prerelease }}

          args: ${{ matrix.args }}

          uploadUpdaterJson: true
